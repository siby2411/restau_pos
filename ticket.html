<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket QR Code - RestauManager</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', monospace;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .ticket {
            background: white;
            max-width: 380px;
            width: 100%;
            padding: 30px 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
        }
        .ticket-header {
            border-bottom: 2px dashed #ddd;
            padding-bottom: 15px;
            margin-bottom: 15px;
        }
        .ticket-header h2 { font-size: 22px; color: #1a1a2e; letter-spacing: 1px; }
        .ticket-header .subtitle { font-size: 12px; color: #888; margin-top: 4px; }
        .ticket-info {
            text-align: left;
            margin: 15px 0;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        .ticket-info .row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 14px;
        }
        .ticket-info .row .label { color: #888; }
        .ticket-info .row .value { font-weight: 600; color: #1a1a2e; }
        .ticket-info .row .value.total { color: #e94560; font-size: 18px; }
        .qr-container {
            background: white;
            padding: 20px;
            margin: 15px 0;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 220px;
        }
        #qrCode { max-width: 100%; height: auto; }
        #qrCode img { max-width: 100%; height: auto; }
        .ticket-footer {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px dashed #ddd;
            font-size: 11px;
            color: #888;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .btn-group .btn {
            flex: 1;
            padding: 12px 15px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            min-width: 80px;
            transition: all 0.2s;
        }
        .btn-group .btn:active { transform: scale(0.95); }
        .btn-primary { background: #4a90d9; color: white; }
        .btn-success { background: #27ae60; color: white; }
        .btn-download { background: #8e44ad; color: white; }
        .btn-primary:hover { background: #357abd; }
        .btn-success:hover { background: #219a52; }
        .btn-download:hover { background: #7d3c98; }
        .loading { color: #888; font-size: 14px; padding: 20px; }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 14px;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }
        .toast.success { background: #27ae60; }
        .toast.error { background: #e74c3c; }
        @media print {
            .btn-group { display: none; }
            .ticket { box-shadow: none; border: 1px solid #ddd; }
            body { background: white; padding: 0; }
        }
    </style>
</head>
<body>
    <div class="ticket" id="ticket">
        <div class="ticket-header">
            <h2>🍽️ RestauManager</h2>
            <div class="subtitle">Ω OMEGA CONSULTING</div>
        </div>

        <div id="ticketInfo" class="ticket-info">
            <div class="loading">⏳ Chargement du ticket...</div>
        </div>

        <div class="qr-container">
            <div id="qrCode"></div>
        </div>

        <div class="ticket-footer">
            <p>📱 Scannez le QR Code pour payer</p>
            <p style="margin-top:4px;font-size:10px;">Ou téléchargez l'image pour l'utiliser ailleurs</p>
        </div>

        <div class="btn-group">
            <button class="btn btn-download" onclick="downloadQR()">📥 Télécharger QR</button>
            <button class="btn btn-primary" onclick="window.print()">🖨️ Imprimer</button>
            <button class="btn btn-success" id="btnPayer">💳 Payer</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let currentFacture = null;
        let qrCodeInstance = null;

        function showToast(msg, type = 'info') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast ' + type + ' show';
            clearTimeout(t._timeout);
            t._timeout = setTimeout(() => t.classList.remove('show'), 3000);
        }

        function downloadQR() {
            const qrContainer = document.getElementById('qrCode');
            const qrImg = qrContainer.querySelector('img');
            if (!qrImg) {
                showToast('❌ QR Code non disponible', 'error');
                return;
            }
            const link = document.createElement('a');
            link.download = `qrcode_facture_${currentFacture?.numero || 'unknown'}.png`;
            link.href = qrImg.src;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            showToast('✅ QR Code téléchargé !', 'success');
        }

        async function loadTicket() {
            const urlParams = new URLSearchParams(window.location.search);
            const factureId = urlParams.get('id') || 1;
            
            const infoDiv = document.getElementById('ticketInfo');
            const qrContainer = document.getElementById('qrCode');
            
            try {
                const response = await fetch(`/api/qrcode/${factureId}`);
                const data = await response.json();
                
                if (data.success) {
                    currentFacture = data.data.facture;
                    const facture = currentFacture;
                    const qrData = data.data.qr_data;
                    
                    infoDiv.innerHTML = `
                        <div class="row"><span class="label">Facture</span><span class="value">${facture.numero}</span></div>
                        <div class="row"><span class="label">Table</span><span class="value">${facture.table_num || 'N/A'}</span></div>
                        <div class="row"><span class="label">Date</span><span class="value">${facture.created_at ? facture.created_at.split(' ')[0] : '-'}</span></div>
                        <div class="row"><span class="label">Statut</span><span class="value" style="color:${facture.statut === 'payée' ? '#27ae60' : '#f39c12'}">${facture.statut === 'payée' ? '✅ Payée' : '⏳ En attente'}</span></div>
                        <div class="row" style="border-top:1px solid #ddd;padding-top:8px;margin-top:4px;">
                            <span class="label">TOTAL</span>
                            <span class="value total">${Number(facture.total).toLocaleString()} FCFA</span>
                        </div>
                    `;
                    
                    // Générer le QR Code avec niveau de correction L (plus de capacité)
                    qrContainer.innerHTML = '';
                    qrCodeInstance = new QRCode(qrContainer, {
                        text: data.data.url,
                        width: 200,
                        height: 200,
                        colorDark: '#1a1a2e',
                        colorLight: '#ffffff',
                        correctLevel: QRCode.CorrectLevel.L  // L = plus de capacité
                    });
                    
                    document.getElementById('btnPayer').onclick = function() {
                        window.open(`/paiement.html?q=${encodeURIComponent(qrData)}`, '_blank');
                    };
                    
                } else {
                    infoDiv.innerHTML = `<div style="text-align:center;padding:20px;color:#e74c3c;">❌ ${data.error || 'Erreur de chargement'}</div>`;
                }
            } catch (err) {
                infoDiv.innerHTML = `<div style="text-align:center;padding:20px;color:#e74c3c;">❌ Erreur: ${err.message}</div>`;
            }
        }

        document.addEventListener('DOMContentLoaded', loadTicket);
    </script>
</body>
</html>
